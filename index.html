  <body>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Clicker Game",
      "url": "https://clicker-site.vercel.app",
      "author": {
        "@type": "Person",
        "name": "Levashi",
        "url": "https://github.com/levashi"
      }
    }
    </script>
    <div id="root"></div>
    <script>
      (function(){
        var p = location.pathname;
        var langs = ['en','fr','es','zh'];
        var has = false;
        for(var i=0;i<langs.length;i++){
          if(p === '/'+langs[i] || p.startsWith('/'+langs[i]+'/')){has=true;break;}
        }
        if(!has && (p==='/'||p==='')){
          var bl = (navigator.language||'en').toLowerCase();
          var tl = 'en';
          if(bl.startsWith('fr')) tl='fr';
          else if(bl.startsWith('es')) tl='es';
          else if(bl.startsWith('zh')) tl='zh';
          location.replace('/'+tl);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
